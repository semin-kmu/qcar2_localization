ekf_filter_node:
  ros__parameters:
    frequency: 100.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: false
    publish_acceleration: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    twist0: /wheel/twist_raw
    twist0_queue_size: 20
    twist0_nodelay: false
    twist0_differential: false
    twist0_relative: false
    twist0_config: [false, false, false,
                    false, false, false,
                    true,  false, false,
                    false, false, false,
                    false, false, false]

    imu0: /qcar2_imu
    imu0_queue_size: 50
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
    imu0_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
